spring.application.name=HireFlow

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hireflow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mysql@db}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET:hireflow-hireflow-hireflow-hireflow-123456}

server.port=${PORT:8080}