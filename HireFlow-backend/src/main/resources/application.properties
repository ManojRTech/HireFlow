spring.application.name=HireFlow

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hireflow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:manoj}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Postgres@DB}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET:hireflow-hireflow-hireflow-hireflow-123456}

server.port=${PORT:8080}